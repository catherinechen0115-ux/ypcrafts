        <p>YP Crafts 以極簡線條勾勒手作的溫度，在現代美感中保留職人的細膩與真誠。品牌標誌中央的花朵意象，呼應毛根素材流動延展的特性，象徵每一次創作都能綻放獨一無二的生命力。</p>
        <p>我們保留類手寫字體的自然起伏，讓品牌語言更親近、更有人情味。對 YP Crafts 而言，每件作品都不只是工藝品，而是承載祝福與心意的禮物。</p>
        <p>品牌靈魂源自黃玫瑰的花語：純潔友誼、美好祝福、歡樂樂觀。我們相信「每一份手作，都是一份被愛著的禮物」，邀請你一起感受由指尖綻放的純粹感動。</p>
