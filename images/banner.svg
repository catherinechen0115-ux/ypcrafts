<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <!-- 背景漸層：粉裸色薄紗感 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF0EE;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#F9E4E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F2D8DC;stop-opacity:1" />
    </linearGradient>
    <!-- 薄紗紋路疊層 -->
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- 花瓣柔和陰影 -->
    <filter id="petalShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#C9808090"/>
    </filter>
    <filter id="dahliaGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- 絨毛材質 -->
    <filter id="fuzzy">
      <feTurbulence type="turbulence" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="420" fill="url(#bgGrad)"/>

  <!-- 薄紗波紋裝飾（右側） -->
  <g opacity="0.18" fill="none" stroke="#E8C0C8" stroke-width="1.2">
    <path d="M820,0 Q900,80 860,160 Q820,240 900,320 Q960,400 920,420"/>
    <path d="M860,0 Q940,100 900,200 Q860,280 930,360 Q980,420 960,420"/>
    <path d="M900,0 Q980,90 940,180 Q900,270 970,360 Q1010,420 1000,420"/>
    <path d="M940,0 Q1020,100 980,200 Q950,300 1020,380 Q1050,420 1040,420"/>
    <path d="M990,0 Q1060,110 1030,210 Q1000,310 1060,390 Q1090,420 1080,420"/>
    <path d="M1040,0 Q1110,100 1080,200 Q1050,300 1110,380 Q1140,420 1130,420"/>
    <path d="M1090,0 Q1160,110 1130,210 Q1100,310 1160,390 Q1185,420 1180,420"/>
  </g>

  <!-- ===== 右側：彼岸花（紅色）===== -->
  <g transform="translate(920, 195)" filter="url(#petalShadow)">
    <!-- 花莖 -->
    <line x1="0" y1="0" x2="-15" y2="120" stroke="#5A7A50" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 向外彎曲的花瓣（6片，彼岸花特徵：細長向後捲） -->
    <g fill="#C41E3A" opacity="0.95">
      <!-- 花瓣 1 -->
      <path d="M0,0 Q-35,-55 -20,-95 Q-8,-75 0,0" stroke="#9B1020" stroke-width="0.5"/>
      <!-- 花瓣 2 -->
      <path d="M0,0 Q15,-58 35,-90 Q15,-70 0,0" stroke="#9B1020" stroke-width="0.5"/>
      <!-- 花瓣 3 -->
      <path d="M0,0 Q50,-30 75,-55 Q45,-25 0,0" stroke="#9B1020" stroke-width="0.5"/>
      <!-- 花瓣 4 -->
      <path d="M0,0 Q55,15 72,42 Q38,20 0,0" stroke="#9B1020" stroke-width="0.5"/>
      <!-- 花瓣 5 -->
      <path d="M0,0 Q20,58 10,88 Q-5,62 0,0" stroke="#9B1020" stroke-width="0.5"/>
      <!-- 花瓣 6 -->
      <path d="M0,0 Q-28,52 -48,75 Q-28,40 0,0" stroke="#9B1020" stroke-width="0.5"/>
    </g>
    <!-- 花蕊（細長捲鬚） -->
    <g fill="none" stroke="#C41E3A" stroke-width="1.2" stroke-linecap="round">
      <path d="M0,0 Q-40,-50 -38,-78"><animate attributeName="d" values="M0,0 Q-40,-50 -38,-78;M0,0 Q-42,-48 -40,-76;M0,0 Q-40,-50 -38,-78" dur="4s" repeatCount="indefinite"/></path>
      <path d="M0,0 Q-25,-55 -18,-82"/>
      <path d="M0,0 Q5,-56 18,-80"/>
      <path d="M0,0 Q30,-48 42,-72"/>
      <path d="M0,0 Q48,-22 65,-38"/>
      <path d="M0,0 Q50,5 70,18"/>
      <path d="M0,0 Q38,30 50,52"/>
      <path d="M0,0 Q18,52 12,78"/>
      <path d="M0,0 Q-10,55 -22,76"/>
      <path d="M0,0 Q-40,38 -56,58"/>
    </g>
    <!-- 花蕊末端小點 -->
    <g fill="#E83050">
      <ellipse cx="-38" cy="-80" rx="3" ry="4.5" transform="rotate(-15,-38,-80)"/>
      <ellipse cx="-18" cy="-84" rx="3" ry="4.5" transform="rotate(-5,-18,-84)"/>
      <ellipse cx="18" cy="-82" rx="3" ry="4.5" transform="rotate(8,18,-82)"/>
      <ellipse cx="42" cy="-74" rx="3" ry="4.5" transform="rotate(20,42,-74)"/>
      <ellipse cx="66" cy="-40" rx="3" ry="4.5" transform="rotate(40,66,-40)"/>
      <ellipse cx="72" cy="16" rx="3" ry="4.5" transform="rotate(60,72,16)"/>
      <ellipse cx="52" cy="52" rx="3" ry="4.5" transform="rotate(70,52,52)"/>
      <ellipse cx="12" cy="80" rx="3" ry="4.5" transform="rotate(80,12,80)"/>
      <ellipse cx="-22" cy="78" rx="3" ry="4.5" transform="rotate(-80,-22,78)"/>
      <ellipse cx="-56" cy="60" rx="3" ry="4.5" transform="rotate(-55,-56,60)"/>
    </g>
  </g>

  <!-- ===== 右側偏遠：彼岸花（紫粉色，稍小稍後方）===== -->
  <g transform="translate(1060, 230) scale(0.82)" filter="url(#petalShadow)" opacity="0.9">
    <line x1="0" y1="0" x2="10" y2="110" stroke="#5A7A50" stroke-width="2.5" stroke-linecap="round"/>
    <g fill="#B060A0" opacity="0.9">
      <path d="M0,0 Q-32,-52 -16,-92" stroke="#8B4080" stroke-width="0.5"/>
      <path d="M0,0 Q12,-56 32,-88" stroke="#8B4080" stroke-width="0.5"/>
      <path d="M0,0 Q48,-28 72,-52" stroke="#8B4080" stroke-width="0.5"/>
      <path d="M0,0 Q52,14 68,40" stroke="#8B4080" stroke-width="0.5"/>
      <path d="M0,0 Q18,56 8,86" stroke="#8B4080" stroke-width="0.5"/>
      <path d="M0,0 Q-26,50 -44,72" stroke="#8B4080" stroke-width="0.5"/>
    </g>
    <g fill="none" stroke="#C070B0" stroke-width="1.2" stroke-linecap="round">
      <path d="M0,0 Q-38,-48 -36,-76"/>
      <path d="M0,0 Q-22,-52 -16,-80"/>
      <path d="M0,0 Q4,-54 16,-78"/>
      <path d="M0,0 Q28,-46 40,-70"/>
      <path d="M0,0 Q46,-20 62,-36"/>
      <path d="M0,0 Q48,4 66,16"/>
      <path d="M0,0 Q36,28 48,50"/>
      <path d="M0,0 Q16,50 10,76"/>
      <path d="M0,0 Q-8,53 -20,74"/>
      <path d="M0,0 Q-38,36 -54,56"/>
    </g>
    <g fill="#D080C0">
      <ellipse cx="-36" cy="-78" rx="2.8" ry="4.2" transform="rotate(-15,-36,-78)"/>
      <ellipse cx="-16" cy="-82" rx="2.8" ry="4.2"/>
      <ellipse cx="16" cy="-80" rx="2.8" ry="4.2"/>
      <ellipse cx="40" cy="-72" rx="2.8" ry="4.2"/>
      <ellipse cx="63" cy="-38" rx="2.8" ry="4.2"/>
      <ellipse cx="68" cy="14" rx="2.8" ry="4.2"/>
      <ellipse cx="50" cy="50" rx="2.8" ry="4.2"/>
      <ellipse cx="10" cy="78" rx="2.8" ry="4.2"/>
      <ellipse cx="-20" cy="76" rx="2.8" ry="4.2"/>
      <ellipse cx="-54" cy="58" rx="2.8" ry="4.2"/>
    </g>
  </g>

  <!-- ===== 左側：絨毛大理花（粉色 dahlia）===== -->
  <g transform="translate(195, 210)">
    <!-- 外層花瓣（16片） -->
    <g filter="url(#fuzzy)">
      <g fill="#F0C0CC" stroke="#D898B0" stroke-width="0.5">
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(0)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(22.5)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(45)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(67.5)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(90)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(112.5)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(135)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(157.5)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(180)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(202.5)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(225)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(247.5)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(270)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(292.5)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(315)"/>
        <ellipse cx="0" cy="-88" rx="14" ry="28" transform="rotate(337.5)"/>
      </g>
    </g>
    <!-- 中層花瓣（稍深、稍小） -->
    <g filter="url(#fuzzy)">
      <g fill="#EAA8BE" stroke="#C880A0" stroke-width="0.5">
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(11.25)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(33.75)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(56.25)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(78.75)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(101.25)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(123.75)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(146.25)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(168.75)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(191.25)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(213.75)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(236.25)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(258.75)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(281.25)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(303.75)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(326.25)"/>
        <ellipse cx="0" cy="-62" rx="11" ry="22" transform="rotate(348.75)"/>
      </g>
    </g>
    <!-- 內層花瓣 -->
    <g filter="url(#fuzzy)">
      <g fill="#E490A8" stroke="#B86888" stroke-width="0.5">
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(0)"/>
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(30)"/>
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(60)"/>
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(90)"/>
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(120)"/>
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(150)"/>
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(180)"/>
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(210)"/>
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(240)"/>
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(270)"/>
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(300)"/>
        <ellipse cx="0" cy="-38" rx="8" ry="16" transform="rotate(330)"/>
      </g>
    </g>
    <!-- 花心（鮮黃） -->
    <circle cx="0" cy="0" r="22" fill="#F0E050" opacity="0.92"/>
    <circle cx="0" cy="0" r="16" fill="#E8D830"/>
    <!-- 花蕊小點 -->
    <g fill="#C8B010">
      <circle cx="0" cy="-10" r="2.5"/>
      <circle cx="8" cy="-6" r="2"/>
      <circle cx="10" cy="3" r="2.5"/>
      <circle cx="4" cy="10" r="2"/>
      <circle cx="-5" cy="12" r="2.5"/>
      <circle cx="-10" cy="5" r="2"/>
      <circle cx="-10" cy="-5" r="2.5"/>
      <circle cx="-4" cy="-12" r="2"/>
    </g>
    <!-- 白色花蕊尖端 -->
    <g fill="white" opacity="0.85">
      <circle cx="0" cy="-14" r="2"/>
      <circle cx="10" cy="-9" r="1.8"/>
      <circle cx="13" cy="4" r="2"/>
      <circle cx="6" cy="13" r="1.8"/>
      <circle cx="-6" cy="14" r="2"/>
      <circle cx="-13" cy="5" r="1.8"/>
      <circle cx="-13" cy="-7" r="2"/>
      <circle cx="-5" cy="-14" r="1.8"/>
    </g>
  </g>

  <!-- 左側小葉片裝飾 -->
  <g transform="translate(155, 280)" fill="#8AAA70" opacity="0.6">
    <path d="M0,0 Q-20,-30 -10,-55 Q5,-30 0,0"/>
    <path d="M0,0 Q20,-25 35,-45 Q10,-22 0,0"/>
  </g>
  <g transform="translate(240, 295)" fill="#8AAA70" opacity="0.5">
    <path d="M0,0 Q10,-28 5,-50 Q-5,-25 0,0"/>
  </g>

  <!-- 散落花瓣裝飾 -->
  <g opacity="0.35" fill="#E8A0B8">
    <ellipse cx="340" cy="80" rx="8" ry="18" transform="rotate(-30,340,80)"/>
    <ellipse cx="380" cy="340" rx="6" ry="14" transform="rotate(20,380,340)"/>
    <ellipse cx="820" cy="60" rx="7" ry="15" transform="rotate(45,820,60)"/>
    <ellipse cx="1120" cy="350" rx="5" ry="12" transform="rotate(-20,1120,350)"/>
  </g>
  <g opacity="0.25" fill="#C41E3A">
    <ellipse cx="760" cy="380" rx="5" ry="11" transform="rotate(30,760,380)"/>
    <ellipse cx="440" cy="40" rx="4" ry="9" transform="rotate(-15,440,40)"/>
    <ellipse cx="1150" cy="80" rx="5" ry="11" transform="rotate(50,1150,80)"/>
  </g>

  <!-- ===== 中央文字 ===== -->
  <!-- 品牌名底部光暈 -->
  <ellipse cx="600" cy="215" rx="260" ry="80" fill="white" opacity="0.28"/>

  <!-- 英文副標 -->
  <text x="600" y="155" text-anchor="middle"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="16" fill="#B06080" letter-spacing="5" opacity="0.85">
    Handmade and Loved
  </text>

  <!-- 主標題 YP Crafts -->
  <text x="600" y="230" text-anchor="middle"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="72" font-weight="normal" fill="#7A3050" letter-spacing="4" opacity="0.92">
    YP Crafts
  </text>

  <!-- 中文副標 -->
  <text x="600" y="278" text-anchor="middle"
    font-family="'Georgia', serif"
    font-size="18" fill="#A06070" letter-spacing="8" opacity="0.78">
    將祝福與溫度，編織進每一份手作之中
  </text>

  <!-- 裝飾線 -->
  <line x1="440" y1="295" x2="520" y2="295" stroke="#C89090" stroke-width="0.8" opacity="0.6"/>
  <circle cx="600" cy="295" r="3" fill="#C89090" opacity="0.6"/>
  <line x1="680" y1="295" x2="760" y2="295" stroke="#C89090" stroke-width="0.8" opacity="0.6"/>
</svg>
