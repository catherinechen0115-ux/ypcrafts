  <style>
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .gallery-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2rem 0 2.5rem;
    }

    .gallery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem 1.6rem;
    }

    .gallery-header h2 {
      margin: 0;
      font-size: 1.6rem;
      font-family: "Zen Maru Gothic", serif;
      letter-spacing: .12em;
    }

    .back-link {
      font-size: .85rem;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--ink); }

    /* ── 滑動軌道 ── */
    .slider-track {
      display: flex;
      gap: 1.6rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      /* 左右留白讓第一張/最後一張也能置中 */
      padding: 2.5rem calc(50% - 155px) 2.5rem;
      scrollbar-width: none;
      align-items: center;
    }
    .slider-track::-webkit-scrollbar { display: none; }

    /* ── 卡片基本樣式 ── */
    .slider-card {
      flex: 0 0 280px;
      scroll-snap-align: center;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #fff;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      /* 預設縮小 + 半透明 */
      transform: scale(0.82);
      opacity: 0.55;
      transition: transform .35s ease, opacity .35s ease, box-shadow .35s ease;
      cursor: pointer;
      will-change: transform, opacity;
    }

    /* 焦點卡片：放大、全不透明、陰影 */
    .slider-card.is-active {
      transform: scale(1.2);
      opacity: 1;
      box-shadow: 0 18px 40px rgba(0,0,0,.13);
    }

    .slider-card img {
      width: 84%;
      margin: 1.1rem auto 0;
      aspect-ratio: 4/5;
      object-fit: cover;
      border-radius: 14px;
      display: block;
    }

    .slider-card .card-meta {
      padding: 1rem 1.1rem 1.2rem;
    }

    .slider-card .card-meta h3 {
      margin: 0;
      font-size: .95rem;
      line-height: 1.5;
    }

    /* ── 導覽點 ── */
    .slider-dots {
      display: flex;
      gap: .45rem;
      justify-content: center;
      padding-top: 1rem;
      flex-wrap: wrap;
    }

    .slider-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid var(--line);
      color: var(--muted);
      font-size: .72rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, border-color .2s, color .2s, transform .2s;
    }

    .slider-dot.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
      transform: scale(1.15);
    }

    /* ── 箭頭 ── */
    .slider-nav {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding-top: 1.2rem;
    }

    .slider-arrow {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1.5px solid var(--line);
      background: #fff;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
      line-height: 1;
    }

    .slider-arrow:hover {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }
  </style>
</head>

    <div class="slider-dots" id="sliderDots"></div>

  <script>
    const track = document.getElementById('sliderTrack');
    const dotsWrap = document.getElementById('sliderDots');
    const cards = Array.from(track.querySelectorAll('.slider-card'));
    let activeIndex = 0;

    // 建立導覽點
    cards.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'slider-dot';
      dot.textContent = i + 1;
      dot.setAttribute('aria-label', `作品 ${String(i + 1).padStart(2, '0')}`);
      dot.addEventListener('click', () => goTo(i));
      dotsWrap.appendChild(dot);
    });

    const dots = Array.from(dotsWrap.querySelectorAll('.slider-dot'));

    function goTo(index) {
      activeIndex = Math.max(0, Math.min(index, cards.length - 1));
      const card = cards[activeIndex];
      const trackCenter = track.offsetWidth / 2;
      const cardCenter = card.offsetLeft + card.offsetWidth / 2;
      track.scrollTo({ left: cardCenter - trackCenter, behavior: 'smooth' });
      refresh();
    }

    function refresh() {
      cards.forEach((c, i) => c.classList.toggle('is-active', i === activeIndex));
      dots.forEach((d, i) => d.classList.toggle('active', i === activeIndex));
    }

    // 滾動時找最近中央的卡片
    let scrollTimer;
    track.addEventListener('scroll', () => {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        const trackCenter = track.scrollLeft + track.offsetWidth / 2;
        let closest = 0;
        let minDist = Infinity;
        cards.forEach((card, i) => {
          const cardCenter = card.offsetLeft + card.offsetWidth / 2;
          const dist = Math.abs(cardCenter - trackCenter);
          if (dist < minDist) { minDist = dist; closest = i; }
        });
        activeIndex = closest;
        refresh();
      }, 60);
    }, { passive: true });

    document.getElementById('prevBtn').addEventListener('click', () => goTo(activeIndex - 1));
    document.getElementById('nextBtn').addEventListener('click', () => goTo(activeIndex + 1));

    // 初始化
    goTo(0);
  </script>
